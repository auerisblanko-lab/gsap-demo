<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GSAP Mouse Glow</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

body{
margin:0;
height:100vh;
background:#0f0f0f;
overflow:hidden;
}

.glow{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle, #00ffff, transparent 70%);
pointer-events:none;
filter:blur(25px);
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-family:sans-serif;
font-size:40px;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="text">Move your mouse</div>

<script>

const glow = document.querySelector(".glow");

document.addEventListener("mousemove",(e)=>{

gsap.to(glow,{
x:e.clientX-60,
y:e.clientY-60,
duration:0.3,
ease:"power2.out"
});

});

</script>

</body>
</html>
